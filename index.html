<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stephan Campbell</title>

  <style>
    :root {
      --bg: #fcfbfb;
      --text: #111111;
      --muted: #666666;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 1rem 0;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .descriptor {
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .links {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .links-row {
      margin-bottom: 0.4rem;
    }

    a {
      color: inherit;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    a:hover {
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="page">

    <h1>Stephan Campbell</h1>

    <div class="descriptor">
      Writer &nbsp;—&nbsp; Advisor &nbsp;—&nbsp; Recruiter
    </div>

    <div class="links">
      <div class="links-row">
        <a href="https://stephancampbell.github.io/">Notes</a>
      </div>

      <div class="links-row">
        <a href="https://steveplaysgo.substack.com/">Substack</a>
      </div>
    </div>

  </div>
</body>
</html>
